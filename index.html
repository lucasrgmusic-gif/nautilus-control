<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nautilus Pro Horizontal</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #050505; --text: #f0f0f0; --accent: #0a84ff; --danger: #ff453a; --success: #32d74b; --panel: #111; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; }
        .screen { display: none; width: 100%; height: 100%; }
        .active { display: flex; }
        
        /* TELA 1: SETUP */
        #setup { flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        select, button { width: 50%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1c1c1e; color: white; font-size: 16px; }

        /* TELA 2: MAIN */
        #main { display: flex; width: 100vw; height: 100vh; }
        .q-display { flex: 1.3; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; border-right: 2px solid #222; }
        .q-mixer { flex: 0.7; padding: 20px; display: flex; flex-direction: column; justify-content: center; background: var(--panel); }

        /* Fontes Display */
        .info-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .val-trans { font-size: 65px; font-weight: 900; color: var(--accent); line-height: 1; margin: 5px 0; }
        .val-time { font-size: 45px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .val-mode { font-size: 38px; font-weight: 700; color: #ccc; }
        
        /* Status Bar */
        .status-bar { padding: 10px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: 900; margin-top: 10px; transition: 0.3s; }
        .status-on { background: rgba(50, 215, 75, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-off { background: rgba(255, 69, 58, 0.2); color: var(--danger); border: 1px solid var(--danger); }

        /* Mixer */
        .mixer { display: flex; justify-content: space-around; align-items: flex-end; height: 80%; gap: 10px; }
        .bar-container { width: 22%; height: 100%; background: #000; border-radius: 5px; position: relative; overflow: hidden; border: 1px solid #333; }
        .bar-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #0a84ff, #5efce8); }
        .cc-label { font-size: 14px; text-align: center; color: #888; margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup" class="screen active">
        <h2 style="color: var(--accent)">Nautilus Pro Setup</h2>
        <button id="btn-init">1. HABILITAR MIDI</button>
        <select id="midi-in"></select>
        <select id="midi-out"></select>
        <button id="btn-ok" style="background: var(--success); border:none;">2. CONECTAR</button>
    </div>

    <div id="main" class="screen">
        <div class="q-display">
            <div>
                <div class="info-label">Transição</div>
                <div id="disp-trans" class="val-trans">Início</div>
            </div>
            <div>
                <div class="info-label">Tempo / Modo</div>
                <div id="disp-time" class="val-time">0.0s</div>
                <div id="disp-mode" class="val-mode">Natural</div>
            </div>
            <div id="txt-active" class="status-bar status-on">CONTROLE ATIVO</div>
        </div>

        <div class="q-mixer">
            <div class="mixer">
                <div class="bar-container"><div id="bar101" class="bar-fill"></div></div>
                <div class="bar-container"><div id="bar102" class="bar-fill"></div></div>
                <div class="bar-container"><div id="bar103" class="bar-fill"></div></div>
                <div class="bar-container"><div id="bar104" class="bar-fill"></div></div>
            </div>
            <div style="display: flex; justify-content: space-around;">
                <span class="cc-label">101</span><span class="cc-label">102</span>
                <span class="cc-label">103</span><span class="cc-label">104</span>
            </div>
        </div>
    </div>

<script>
    let midiAccess = null, input = null, output = null, isMidiActive = true;
    let currentTransition = "Início", currentKeyboardMode = "Natural";
    let ccLevels = { 101: 127, 102: 0, 103: 0, 104: 0 };
    let transInterval = null;

    const SYSEX_HDR = [0xF0, 0x42, 0x30, 0x00, 0x01, 0x5D];
    const CHS_1_5 = [0x00, 0x01, 0x02, 0x03, 0x04];

    document.getElementById('btn-init').onclick = async () => {
        midiAccess = await navigator.requestMIDIAccess({ sysex: true });
        const i = document.getElementById('midi-in'), o = document.getElementById('midi-out');
        midiAccess.inputs.forEach(p => i.add(new Option(p.name, p.id)));
        midiAccess.outputs.forEach(p => o.add(new Option(p.name, p.id)));
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
    };

    document.getElementById('btn-ok').onclick = async () => {
        input = midiAccess.inputs.get(document.getElementById('midi-in').value);
        output = midiAccess.outputs.get(document.getElementById('midi-out').value);
        if (output) {
            input.onmidimessage = handleMidi;
            document.getElementById('setup').classList.remove('active');
            document.getElementById('main').classList.add('active');
            await resetGeral(); 
        }
    };

    async function sendSysex(data) {
        if (!output) return;
        output.send([...SYSEX_HDR, ...data, 0xF7]);
        await new Promise(r => setTimeout(r, 12)); 
    }

    function applyCurveAndSend(cc, linearVal) {
        if (!output) return;
        ccLevels[cc] = linearVal; 
        const logVal = Math.round(127 * Math.pow(linearVal / 127, 1.5));
        output.send([0xB0, cc, logVal]);
        document.getElementById(`bar${cc}`).style.height = (logVal / 127 * 100) + '%';
    }

    async function resetGeral() {
        if (transInterval) clearInterval(transInterval);
        transInterval = null;
        document.getElementById('disp-time').innerText = "0.0s";
        document.getElementById('disp-trans').innerText = "Início";
        currentTransition = "Início";

        await sendSysex([0x43, 0x0F, 0x00, 0x00, 0x05, 0x00, 0x00, 0x00, 0x01]);
        await sendSysex([0x6D, 0x05, 0x00, 0x00, 0x03, 0x00, 0x00, 0x00, 0x01]);
        await sendSysex([0x6D, 0x05, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00]);
        await sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x01, 0x00, 0x00, 0x00]);
        await sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x00]);

        setKeyboardMode("Natural");
        applyCurveAndSend(101, 127);
        applyCurveAndSend(102, 0);
        applyCurveAndSend(103, 0);
        applyCurveAndSend(104, 0);
    }

    function handleMidi(e) {
        const d = Array.from(e.data);
        const hex = d.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');

        if ((d[0] & 0xF0) === 0xC0) { setStatus(false); return; }
        if (hex.includes("5D 6D 05 00 00 03 00 00 00 01")) { setStatus(true); resetGeral(); }
        if (hex.includes("5D 6D 05 00 00 03 00 00 00 00")) setStatus(false);

        if (!isMidiActive) return;

        if (hex.includes("5D 6D 05 00 00 01 00 00 00")) handleTransitionTrigger(d[d.length - 2]);
        
        if (hex.includes("5D 43 1B 00 00 06")) {
            const val = d[14]; 
            const val11 = d[11];
            if (val11 === 1 && val === 1) setKeyboardMode("Baixo");
            else if (val11 === 0 && val === 1) setKeyboardMode("Solo");
            else setKeyboardMode("Natural");
        }
    }

    function setStatus(active) {
        isMidiActive = active;
        const el = document.getElementById('txt-active');
        el.innerText = active ? "CONTROLE ATIVO" : "CONTROLE INATIVO";
        el.className = `status-bar ${active ? 'status-on' : 'status-off'}`;
    }

    function handleTransitionTrigger(code) {
        const old = currentTransition;
        let targets = {}, next = "";
        if (code === 0) { next = "Início"; targets = {101:127, 102:0, 103:0, 104:0}; }
        else if (code === 1) { next = "ParteA"; targets = {101:115, 102:115, 103:0, 104:0}; }
        else if (code === 2) { next = "ParteB"; targets = {101:105, 102:105, 103:80, 104:50}; }
        else if (code === 3) { next = "Final"; targets = {101:80, 102:80, 103:127, 104:127}; }
        
        const isLow = (t) => t === "Início" || t === "ParteA";
        if (isLow(old) && !isLow(next)) {
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x01]);
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x00]);
        } else if (!isLow(old) && isLow(next)) {
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x01]);
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x00]);
        }
        currentTransition = next;
        document.getElementById('disp-trans').innerText = next;
        runTransition(targets);
    }

    function runTransition(targets) {
        if (transInterval) clearInterval(transInterval);
        let step = 0; const steps = 40; 
        const startValues = { ...ccLevels };
        transInterval = setInterval(() => {
            step++;
            const ratio = step / steps;
            Object.keys(targets).forEach(cc => {
                applyCurveAndSend(parseInt(cc), startValues[cc] + (targets[cc] - startValues[cc]) * ratio);
            });
            document.getElementById('disp-time').innerText = `${((steps - step) * 0.1).toFixed(1)}s`;
            if (step >= steps) { clearInterval(transInterval); transInterval = null; }
        }, 100);
    }

    async function setKeyboardMode(mode) {
        const old = currentKeyboardMode;
        currentKeyboardMode = mode;
        document.getElementById('disp-mode').innerText = mode;

        if (mode === "Natural") {
            await sendSysex([0x43, 0x04, 0x07, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]); // Ch 8 Vel Max
            await sendSysex([0x43, 0x04, 0x05, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]); // Ch 6 Vel Max
            await sendSysex([0x43, 0x04, 0x06, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]); // Ch 7 Vel Max
            for(let ch of CHS_1_5) {
                await sendSysex([0x43, 0x04, ch, 0x00, 0x16, 0x00, 0x00, 0x00, 0x00]); // Transp 0
                await sendSysex([0x43, 0x04, ch, 0x00, 0x1F, 0x00, 0x00, 0x00, 0x18]); // Bot C1
                await sendSysex([0x43, 0x04, ch, 0x00, 0x1D, 0x00, 0x00, 0x00, 0x6C]); // Top C8
            }
        } else if (mode === "Baixo") {
            if (old === "Solo") await sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x00]);
            await sendSysex([0x43, 0x04, 0x07, 0x00, 0x23, 0x00, 0x00, 0x00, 0x01]); // Ch 8 Vel Normal
            await sendSysex([0x43, 0x04, 0x05, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]); // Ch 6 Vel Max
            await sendSysex([0x43, 0x04, 0x06, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]); // Ch 7 Vel Max
            for(let ch of CHS_1_5) {
                await sendSysex([0x43, 0x04, ch, 0x00, 0x16, 0x00, 0x7F, 0x7F, 0x74]); // Transp -12
                await sendSysex([0x43, 0x04, ch, 0x00, 0x1F, 0x00, 0x00, 0x00, 0x41]); // Bot F4
            }
        } else if (mode === "Solo") {
            if (old === "Baixo") await sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x01, 0x00, 0x00, 0x00]);
            await sendSysex([0x43, 0x04, 0x07, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]); // Ch 8 Vel Max
            await sendSysex([0x43, 0x04, 0x05, 0x00, 0x23, 0x00, 0x00, 0x00, 0x01]); // Ch 6 Vel Normal
            await sendSysex([0x43, 0x04, 0x06, 0x00, 0x23, 0x00, 0x00, 0x00, 0x01]); // Ch 7 Vel Normal
            for(let ch of CHS_1_5) {
                await sendSysex([0x43, 0x04, ch, 0x00, 0x16, 0x00, 0x00, 0x00, 0x0C]); // Transp +12
                await sendSysex([0x43, 0x04, ch, 0x00, 0x1F, 0x00, 0x00, 0x00, 0x18]); // Bot C1
                await sendSysex([0x43, 0x04, ch, 0x00, 0x1D, 0x00, 0x00, 0x00, 0x3B]); // Top B3
            }
        }
    }
</script>
</body>
</html>
