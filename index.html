<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nautilus Pro A11</title>
    <!-- Link para o Manifest (Essencial para Offline MIDI) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a84ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #080808; --text: #f0f0f0; --accent: #0a84ff; --danger: #ff453a; --success: #32d74b; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        #setup { justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        select, button { width: 90%; padding: 18px; font-size: 16px; border-radius: 12px; border: 1px solid #333; background: #1c1c1e; color: white; }
        #main { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1.2fr; height: 100vh; }
        .quadrant { border: 0.5px solid #222; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        .info-label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        .info-val { font-size: 19px; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
        .status-text { font-size: 16px; font-weight: 700; }
        .mixer { display: flex; justify-content: space-around; align-items: flex-end; height: 70%; gap: 6px; }
        .bar-container { width: 22%; height: 100%; background: #1a1a1a; border-radius: 3px; position: relative; overflow: hidden; border: 1px solid #333; }
        .bar-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #0a84ff, #5efce8); }
        #btn-reset { grid-column: span 2; background: transparent; border: 2px solid var(--danger); color: var(--danger); font-size: 20px; font-weight: 800; margin: 15px; border-radius: 15px; text-transform: uppercase; }
        #btn-reset:active { background: var(--danger); color: white; }
        /* No seu <style>: Garante tela cheia e toque limpo */
html, body {
    position: fixed;
    overflow: hidden;
    width: 100%;
    height: 100%;
    user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
    </style>
</head>
<body>

    <div id="setup" class="screen active">
        <h2 style="color: var(--accent)">Korg Nautilus Sync</h2>
        <button id="btn-init">HABILITAR MIDI</button>
        <select id="midi-in"></select>
        <select id="midi-out"></select>
        <button id="btn-ok" style="background: var(--success); border:none;">CONECTAR</button>
    </div>

    <div id="main" class="screen">
        <div class="quadrant">
            <div class="info-label">Transição</div>
            <div id="disp-trans" class="info-val">Início</div>
            <div class="info-label">Tempo / Modo</div>
            <div id="disp-time" class="info-val" style="color: #fff; margin-bottom:2px;">0.0s</div>
            <div id="disp-mode" class="info-val" style="font-size: 16px;">Natural</div>
            <div id="txt-active" class="status-text" style="color: var(--success);">CONTROLE ATIVO</div>
        </div>
        <div class="quadrant">
            <div class="mixer">
                <div class="bar-container"><div id="bar101" class="bar-fill"></div></div>
                <div class="bar-container"><div id="bar102" class="bar-fill"></div></div>
                <div class="bar-container"><div id="bar103" class="bar-fill"></div></div>
                <div class="bar-container"><div id="bar104" class="bar-fill"></div></div>
            </div>
            <div style="display: flex; justify-content: space-around; font-size: 9px; margin-top: 8px; color: #555">
                <span>101</span><span>102</span><span>103</span><span>104</span>
            </div>
        </div>
        <button id="btn-reset">RESET GERAL</button>
    </div>

<script>
    let midiAccess = null, input = null, output = null;
    let isMidiActive = true;
    let currentTransition = "Início", currentKeyboardMode = "Natural";
    let ccLevels = { 101: 127, 102: 0, 103: 0, 104: 0 };
    let transInterval = null;

    const SYSEX_HDR = [0xF0, 0x42, 0x30, 0x00, 0x01, 0x5D];
    const CHS_1_5 = [0x00, 0x01, 0x02, 0x03, 0x04];

    // Registro do Service Worker para modo Offline
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("SW registrado para MIDI Offline"))
            .catch(err => console.log("Erro SW:", err));
    }

    document.getElementById('btn-init').onclick = async () => {
    try {
        // 1. Verificar se o contexto é seguro (necessário para MIDI)
        if (!window.isSecureContext) {
            alert("Erro: O MIDI exige HTTPS ou localhost (Contexto Seguro).");
            return;
        }

        // 2. Solicitar acesso (Agora requer permissão explícita no Chrome 124+)
        console.log("Solicitando permissão MIDI...");
        midiAccess = await navigator.requestMIDIAccess({ sysex: true });

        // 3. Atualizar interface
        const ins = document.getElementById('midi-in'), outs = document.getElementById('midi-out');
        ins.innerHTML = ''; outs.innerHTML = '';
        midiAccess.inputs.forEach(p => ins.add(new Option(p.name, p.id)));
        midiAccess.outputs.forEach(p => outs.add(new Option(p.name, p.id)));
        
        document.getElementById('btn-init').style.backgroundColor = "var(--success)";
        document.getElementById('btn-init').innerText = "MIDI Conectado";
        console.log("Acesso concedido!");

    } catch (err) {
        if (err.name === "SecurityError") {
            alert("Permissão negada pelo navegador. Verifique as configurações de site.");
        } else {
            alert("Falha ao acessar MIDI: " + err.message);
        }
        console.error(err);
    }
};



    document.getElementById('btn-ok').onclick = async () => {
        input = midiAccess.inputs.get(document.getElementById('midi-in').value);
        output = midiAccess.outputs.get(document.getElementById('midi-out').value);
        if (output) {
            input.onmidimessage = handleMidi;
            document.getElementById('setup').classList.remove('active');
            document.getElementById('main').classList.add('active');
            await resetGeral(); 
        }
    };

    async function sendSysex(data) {
        if (!output) return;
        output.send([...SYSEX_HDR, ...data, 0xF7]);
        await new Promise(r => setTimeout(r, 12)); 
    }

    function applyCurveAndSend(cc, linearVal) {
        if (!output) return;
        ccLevels[cc] = linearVal; 
        const logVal = Math.round(127 * Math.pow(linearVal / 127, 1.5));
        output.send([0xB0, cc, logVal]);
        document.getElementById(`bar${cc}`).style.height = (logVal / 127 * 100) + '%';
    }

    async function resetGeral() {
        if (transInterval) clearInterval(transInterval);
        transInterval = null;
        document.getElementById('disp-time').innerText = "0.0s";
        document.getElementById('disp-trans').innerText = "Início";
        currentTransition = "Início";

        await sendSysex([0x43, 0x0F, 0x00, 0x00, 0x05, 0x00, 0x00, 0x00, 0x01]);
        await sendSysex([0x6D, 0x05, 0x00, 0x00, 0x03, 0x00, 0x00, 0x00, 0x01]);
        await sendSysex([0x6D, 0x05, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00]);
        await sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x01, 0x00, 0x00, 0x00]);
        await sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x00]);

        setKeyboardMode("Natural");
        applyCurveAndSend(101, 127);
        applyCurveAndSend(102, 0);
        applyCurveAndSend(103, 0);
        applyCurveAndSend(104, 0);
    }

    function runTransition(targets) {
        if (transInterval) clearInterval(transInterval);
        let step = 0; const steps = 40; 
        const startValues = { ...ccLevels };
        transInterval = setInterval(() => {
            step++;
            const ratio = step / steps;
            Object.keys(targets).forEach(cc => {
                const s = startValues[cc];
                const e = targets[cc];
                applyCurveAndSend(parseInt(cc), s + (e - s) * ratio);
            });
            document.getElementById('disp-time').innerText = `${((steps - step) * 0.1).toFixed(1)}s`;
            if (step >= steps) { clearInterval(transInterval); transInterval = null; }
        }, 100);
    }

    function handleMidi(e) {
    const d = Array.from(e.data);
    const statusByte = d[0];
    const hex = d.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');

    // --- DETECÇÃO DE TROCA DE TIMBRE (Program Change em qualquer canal 0xC0 a 0xCF) ---
    if ((statusByte & 0xF0) === 0xC0) {
        console.log("Troca de Combi detectada. Desativando controle...");
        setStatus(false); // Apenas desativa o controle (muda cor/bloqueia envio)
        if (transInterval) {
            clearInterval(transInterval);
            transInterval = null;
            document.getElementById('disp-time').innerText = "0.0s";
        }
        return;
    }

    // --- RESTANTE DA LÓGICA ---
    if (hex.includes("5D 6D 05 00 00 03 00 00 00 01")) { 
        setStatus(true); 
        resetGeral(); 
    }
    if (hex.includes("5D 6D 05 00 00 03 00 00 00 00")) { 
        setStatus(false); 
    }

    if (!isMidiActive) return;

    // ... lógica de transição e teclado abaixo ...
    if (hex.includes("5D 6D 05 00 00 01 00 00 00")) handleTransitionTrigger(d[d.length - 2]);
    
    if (hex.includes("5D 43 1B 00 00 06")) {
        const v11 = d[11], v14 = d[14]; // Ajustado para pegar o byte correto do array
        if (v11 === 1 && v14 === 1) setKeyboardMode("Baixo");
        else if (v11 === 0 && v14 === 1) setKeyboardMode("Solo");
        else setKeyboardMode("Natural");
    }
}

    function setStatus(active) {
        isMidiActive = active;
        const el = document.getElementById('txt-active');
        el.innerText = active ? "CONTROLE ATIVO" : "CONTROLE INATIVO";
        el.style.color = active ? "var(--success)" : "var(--danger)";
    }

    function handleTransitionTrigger(code) {
        const old = currentTransition;
        let targets = {}, next = "";
        if (code === 0) { next = "Início"; targets = {101:127, 102:0, 103:0, 104:0}; }
        else if (code === 1) { next = "ParteA"; targets = {101:115, 102:115, 103:0, 104:0}; }
        else if (code === 2) { next = "ParteB"; targets = {101:105, 102:105, 103:80, 104:50}; }
        else if (code === 3) { next = "Final"; targets = {101:80, 102:80, 103:127, 104:127}; }
        const isLow = (t) => t === "Início" || t === "ParteA";
        if (isLow(old) && !isLow(next)) {
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x01]);
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x00]);
        } else if (!isLow(old) && isLow(next)) {
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x01]);
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x0E, 0x00, 0x00, 0x00, 0x00]);
        }
        currentTransition = next;
        document.getElementById('disp-trans').innerText = next;
        runTransition(targets);
    }

    async function setKeyboardMode(mode) {
        const old = currentKeyboardMode;
        currentKeyboardMode = mode;
        document.getElementById('disp-mode').innerText = mode;
        if (mode === "Natural") {
            sendSysex([0x43, 0x04, 0x07, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]);
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]);
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]);
            CHS_1_5.forEach(ch => {
                sendSysex([0x43, 0x04, ch, 0x00, 0x16, 0x00, 0x00, 0x00, 0x00]);
                sendSysex([0x43, 0x04, ch, 0x00, 0x1F, 0x00, 0x00, 0x00, 0x18]);
                sendSysex([0x43, 0x04, ch, 0x00, 0x1D, 0x00, 0x00, 0x00, 0x6C]);
            });
        } 
        else if (mode === "Baixo") {
            if (old === "Solo") sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x00]);
            sendSysex([0x43, 0x04, 0x07, 0x00, 0x23, 0x00, 0x00, 0x00, 0x01]);
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]);
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]);
            CHS_1_5.forEach(ch => {
                sendSysex([0x43, 0x04, ch, 0x00, 0x16, 0x00, 0x7F, 0x7F, 0x74]);
                sendSysex([0x43, 0x04, ch, 0x00, 0x1F, 0x00, 0x00, 0x00, 0x41]);
                sendSysex([0x43, 0x04, ch, 0x00, 0x1D, 0x00, 0x00, 0x00, 0x6C]);
            });
        }
        else if (mode === "Solo") {
            if (old === "Baixo") sendSysex([0x43, 0x1B, 0x00, 0x00, 0x06, 0x01, 0x00, 0x00, 0x00]);
            sendSysex([0x43, 0x04, 0x07, 0x00, 0x23, 0x00, 0x00, 0x00, 0x7F]);
            sendSysex([0x43, 0x04, 0x05, 0x00, 0x23, 0x00, 0x00, 0x00, 0x01]);
            sendSysex([0x43, 0x04, 0x06, 0x00, 0x23, 0x00, 0x00, 0x00, 0x01]);
            CHS_1_5.forEach(ch => {
                sendSysex([0x43, 0x04, ch, 0x00, 0x16, 0x00, 0x00, 0x00, 0x0C]);
                sendSysex([0x43, 0x04, ch, 0x00, 0x1F, 0x00, 0x00, 0x00, 0x18]);
                sendSysex([0x43, 0x04, ch, 0x00, 0x1D, 0x00, 0x00, 0x00, 0x3B]);
            });
        }
    }

    document.getElementById('btn-reset').onclick = resetGeral;

    let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); // Previne o prompt automático
    deferredPrompt = e; // Salva o evento para disparar no clique
    console.log("PWA Instalável detectado!");
    
    // Altera o botão de "Habilitar MIDI" para também instalar o app no primeiro clique
    const btnInit = document.getElementById('btn-init');
    const originalFunc = btnInit.onclick;
    
    btnInit.onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt(); // Mostra o pop-up de instalação
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') console.log('Usuário instalou o app');
            deferredPrompt = null;
        }
        if (originalFunc) originalFunc(); // Executa a função MIDI original
    };
});

</script>
</body>
</html>
